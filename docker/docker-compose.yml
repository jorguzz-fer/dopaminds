services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: dopamind
      POSTGRES_PASSWORD: dopamind_dev
      POSTGRES_DB: dopamind
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dopamind"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
